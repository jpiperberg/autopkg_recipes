Comment: |
  Downloads the latest version of Apache NetBeans.  
  Uses githubreleasesinfoprovider
  https://github.com/apache/netbeans/
Identifier: com.github.jpiperberg.download.ApacheNetBeans-Win
MinimumVersion: "2.3"
Input:
  NAME: ApacheNetBeans
  BASE_URL: https://archive.apache.org/dist/netbeans/netbeans-installers/
Process:
  - Processor: URLTextSearcher
    Arguments:
      url: 'https://api.github.com/repos/apache/netbeans/releases'
      re_pattern: 'tag_name\": \"(?P<MajorVersion>\d+)\"'
  - Processor: URLTextSearcher
    Arguments:
      url: "https://www.codelerity.com/netbeans/"
      re_pattern: 'https.*%MajorVersion%\.exe'
      result_output_var_name: downloadURL
  - Processor: URLTextSearcher
    Arguments:
      url: "https://www.codelerity.com/netbeans/"
      re_pattern: '(?<=\.exe x86_64\)<\/span><\/a><\/div>\n    <aside>\n      <code class="hash">SHA256 : )[abcdef0123456789]+'
      result_output_var_name: SHA256
  - Processor: URLDownloader
    Arguments:
      url: "%downloadURL%"
      filename: "%NAME%%MajorVersion%.exe"
  # - Processor: URLDownloader
  #   Arguments:
  #     url: "%shaURL%"
  #     filename: "%NAME%%MajorVersion%.sha512"
  # - Processor: com.github.jgstew.SharedProcessors/SharedUtilityMethods
  # - Processor: com.github.jgstew.SharedProcessors/FileTextSearcher
  #   Arguments:
  #     search_path: "%RECIPE_CACHE_DIR%/downloads/%NAME%%MajorVersion%.sha512"
  #     first_result_only: True
  #     search_pattern: "^[abcdef0123456789]+"
  #     first_result_only: True
  #     file_search_results_var: "SHA512"
  - Processor: EndOfCheckPhase
  - Processor: io.github.hjuutilainen.SharedProcessors/ChecksumVerifier
    Arguments:
      checksum_pathname: "%RECIPE_CACHE_DIR%/downloads/%NAME%%MajorVersion%.exe"
      checksum: "%SHA256%"
      algorithm: SHA256
  - Processor: StopProcessingIf
    Arguments:
      predicate: version == "" OR version == "None"
